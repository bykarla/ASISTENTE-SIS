services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: uneti
      POSTGRES_PASSWORD: uneti123
      POSTGRES_DB: asistente
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U uneti -d asistente" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    # Sin GPU, corre en CPU
    deploy:
      resources:
        limits:
          memory: 6g
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 10s
      retries: 3

  asistente-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - WHISPER_MODEL=tiny
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - whisper_cache:/root/.cache/whisper # para cache del modelo

    deploy:
      resources:
        limits:
          memory: 4g
volumes:
  postgres_data:
  redis_data:
  ollama_data:
  whisper_cache:
