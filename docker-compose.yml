# ByKP: Orquestación de servicios para desarrollo local
# Célula 04: Servicios e Innovación - SIS-UNETI 2026

version: '3.8'

services:
  # ==========================================
  # 1. Base de Datos Principal (PostgreSQL)
  # ==========================================
  postgres_db:
    image: postgres:16-alpine
    container_name: uneti_postgres
    environment:
      POSTGRES_USER: admin_uneti
      POSTGRES_PASSWORD: superpassword2026
      POSTGRES_DB: asistente_virtual
    ports:
      - "5433:5432" # Se cambió a 5433 en el host para evitar conflictos
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema_asistente_virtual.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_uneti -d asistente_virtual"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. Caché y Memoria de Sesiones (Redis)
  # ==========================================
  redis_cache:
    image: redis:7-alpine
    container_name: uneti_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. API Asistente Virtual (FastAPI)
  # ==========================================
  api_asistente:
    build: .
    container_name: uneti_api
    env_file: .env
    environment:
      - IS_DOCKER=true
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    volumes:
      - .:/app
      - chromadb:/app/chroma_db
    restart: unless-stopped

# Declaración de volúmenes para que los datos no se borren si apagamos Docker
volumes:
  pgdata:
  chromadb:
